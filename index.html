<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>經絡背誦教練</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--ink:#22303a;--paper:#faf7f0;--card:#fff;--gold:#a9762f;--gold-dk:#7d5420;
--jade:#2b5f4f;--jade-lt:#e3efe9;--warm:#f0e8d8;--line:#d6ccb5;--muted:#6f6656;--accent:#8f3a3a;
}
body{font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.8;font-size:17px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
a:focus,button:focus,select:focus,[tabindex]:focus{outline:3px solid var(--gold);outline-offset:3px}
.skip{position:absolute;left:-9999px;background:var(--ink);color:#fff;padding:8px 16px;z-index:99}
.skip:focus{left:0;top:0}
#app{max-width:720px;margin:0 auto;padding:1rem}
header{border-bottom:2px solid var(--gold);padding-bottom:.7rem;margin-bottom:1.2rem}
h1{font-size:23px;font-weight:700;color:var(--jade);letter-spacing:1px}
.sub{font-size:13px;color:var(--muted);margin-top:3px}

/* 首頁經絡選單 */
.intro{background:var(--jade-lt);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:15px}
.intro b{color:var(--jade)}
.mer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.mer-btn{padding:14px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;text-align:left;font-family:inherit;color:var(--ink)}
.mer-btn:hover{background:var(--warm);border-color:var(--gold)}
.mer-btn:disabled{opacity:.45;cursor:not-allowed}
.mer-code{font-size:12px;color:var(--gold-dk);font-weight:700;letter-spacing:.5px}
.mer-name{display:block;font-weight:600;font-size:16px;margin-top:2px}
.mer-cnt{font-size:12px;color:var(--muted);margin-top:2px}

/* 背誦流程 */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.btn{padding:10px 16px;font-size:15px;border:1.5px solid var(--gold);border-radius:10px;background:var(--gold);color:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{background:var(--gold-dk);border-color:var(--gold-dk)}
.btn-o{background:var(--card);color:var(--jade);border-color:var(--line)}
.btn-o:hover{background:var(--jade-lt);border-color:var(--jade)}
.btn-sm{padding:7px 13px;font-size:14px}
.flow-title{font-size:19px;font-weight:700;color:var(--jade)}
.flow-sub{font-size:13px;color:var(--muted)}

/* 整段口訣 */
.verse{background:var(--warm);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin-bottom:1.2rem}
.verse-label{font-size:12px;font-weight:700;color:var(--gold-dk);letter-spacing:1px;margin-bottom:.3rem}
.verse-text{font-size:19px;font-weight:600;color:var(--ink);line-height:2;letter-spacing:1px}
.verse-note{font-size:13px;color:var(--muted);margin-top:.5rem}

/* 穴位逐一 */
.prog{font-size:14px;color:var(--muted);margin-bottom:.6rem;text-align:center}
.pt-stage{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:1.5rem 1.3rem;margin-bottom:1rem}
.pt-order{font-size:13px;color:var(--gold-dk);font-weight:700;letter-spacing:.5px}
.pt-name-lg{font-size:30px;font-weight:700;color:var(--jade);margin:.2rem 0}
.pt-name-lg .id{font-size:16px;color:var(--gold-dk);margin-left:8px;letter-spacing:.5px}
.pt-py{font-size:14px;color:var(--muted);font-style:italic}
.pt-tags{display:flex;gap:5px;flex-wrap:wrap;margin:.5rem 0}
.tag{font-size:12px;padding:2px 9px;border-radius:20px;background:var(--jade);color:#fff;font-weight:500}
.tag.sp{background:var(--accent)}
/* 相對位置 — 心理地圖，永遠先顯示 */
.map{background:var(--jade-lt);border-radius:10px;padding:.8rem 1rem;margin:.7rem 0;font-size:17px}
.map-label{font-size:12px;font-weight:700;color:var(--jade);display:block;margin-bottom:.2rem}
/* 小檔案 */
.file{border-top:1px dashed var(--line);margin-top:.9rem;padding-top:.9rem}
.file[hidden]{display:none}
.frow{margin-bottom:.5rem;font-size:15px}
.flabel{display:inline-block;font-size:12px;font-weight:700;color:var(--gold-dk);background:var(--warm);padding:1px 9px;border-radius:5px;margin-right:6px;min-width:64px;text-align:center}
.ftip{background:var(--jade-lt);border-left:3px solid var(--jade);padding:.5rem .8rem;border-radius:0 6px 6px 0;margin-top:.5rem;font-size:15px}
.nav-row{display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;margin-top:1rem}
.nav-left{display:flex;gap:8px;flex-wrap:wrap}
.hint{font-size:13px;color:var(--muted);text-align:center;margin-top:.8rem;line-height:1.6}
kbd{background:var(--warm);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:12px;font-family:inherit}
@media(max-width:480px){#app{padding:.75rem}.pt-name-lg{font-size:26px}.verse-text{font-size:17px}}
</style>
</head>
<body>
<a href="#main" class="skip">跳到主要內容</a>
<span class="sr-only" aria-live="assertive" id="ann"></span>
<div id="app">
<header>
<h1>經絡背誦教練</h1>
<p class="sub">一條經一條經，順著念、順著記 ‧ 相對位置建立心理地圖 ‧ 需要時打開小檔案</p>
</header>

<main id="main">
<!-- 首頁：選經絡 -->
<section id="home" aria-label="選擇經絡">
<div class="intro">
選一條經絡開始。工具會先帶你念<b>整段口訣</b>，再一穴一穴往下走。每停一穴，先聽<b>穴名和相對位置</b>幫你在腦中定位；忘記怎麼取穴時，打開<b>小檔案</b>複習寸法、骨標和解剖。
</div>
<div class="mer-grid" id="mer-grid"></div>
</section>

<!-- 背誦流程 -->
<section id="flow" aria-label="背誦流程" hidden>
<div class="top-bar">
<button class="btn btn-o btn-sm" onclick="goHome()">← 換一條經</button>
<div>
<div class="flow-title" id="flow-title"></div>
<div class="flow-sub" id="flow-sub"></div>
</div>
</div>

<!-- 整段口訣 -->
<div class="verse" id="verse" tabindex="0">
<div class="verse-label">整段口訣</div>
<div class="verse-text" id="verse-text"></div>
<div class="verse-note" id="verse-note"></div>
<button class="btn btn-o btn-sm" style="margin-top:.6rem" onclick="speakVerse()">🔊 念口訣</button>
</div>

<!-- 逐穴 -->
<p class="prog" id="prog" aria-live="polite"></p>
<div class="pt-stage" id="pt-stage" tabindex="0"></div>

<div class="nav-row">
<div class="nav-left">
<button class="btn btn-o btn-sm" onclick="prevPt()">← 上一穴</button>
<button class="btn btn-sm" id="file-btn" onclick="toggleFile()">打開小檔案</button>
</div>
<button class="btn btn-sm" onclick="nextPt()">下一穴 →</button>
</div>
<p class="hint">
電腦：按 <kbd>空白鍵</kbd> 或 <kbd>→</kbd> 到下一穴，<kbd>←</kbd> 回上一穴，<kbd>F</kbd> 開／收小檔案。<br>
手機：往左或往上滑到下一穴，往右或往下滑回上一穴（開語音時用雙指滑）。<br>
忘記取穴就打開小檔案複習。
</p>
</section>
</main>
</div>

 {code:'SI',name:'手太陽小腸經',short:'小腸',cnt:19,ready:true},
 {code:'BL',name:'足太陽膀胱經',short:'膀胱',cnt:67,ready:false},
 {code:'KI',name:'足少陰腎經',short:'腎',cnt:27,ready:false},
 {code:'PC',name:'手厥陰心包經',short:'心包',cnt:9,ready:true},
 {code:'TE',name:'手少陽三焦經',short:'三焦',cnt:23,ready:true},
 {code:'GB',name:'足少陽膽經',short:'膽',cnt:44,ready:false},
 {code:'LR',name:'足厥陰肝經',short:'肝',cnt:14,ready:false},
 {code:'GV',name:'督脈',short:'督',cnt:28,ready:false},
 {code:'CV',name:'任脈',short:'任',cnt:24,ready:false}
];

// VERSES 與 POINTS 資料由外部 meridians.js 提供

// ============ 首頁 ============
function renderHome(){
  var g=document.getElementById('mer-grid'),html='';
  MERIDIANS.forEach(function(m){
    var status=m.ready?(m.cnt+'穴 · 可背誦'):(m.cnt+'穴 · 建置中');
    html+='<button class="mer-btn" '+(m.ready?'':'disabled')+' onclick="startFlow(\''+m.code+'\')" aria-label="'+m.name+'，'+status+'">'+
      '<span class="mer-code">'+m.code+'</span>'+
      '<span class="mer-name">'+m.name+'</span>'+
      '<span class="mer-cnt">'+status+'</span></button>';
  });
  g.innerHTML=html;
}

// ============ 背誦流程 ============
var curMer='',curPts=[],idx=0,fileOpen=false;
function startFlow(code){
  curMer=code;curPts=POINTS[code]||[];idx=0;fileOpen=false;
  var m=MERIDIANS.filter(function(x){return x.code===code})[0];
  document.getElementById('home').hidden=true;
  document.getElementById('flow').hidden=false;
  document.getElementById('flow-title').textContent=m.name+'（'+m.code+'）';
  document.getElementById('flow-sub').textContent='共 '+curPts.length+' 穴，順著念、順著記';
  var v=VERSES[code];
  document.getElementById('verse-text').textContent=v?v.text:'（口訣建置中）';
  document.getElementById('verse-note').textContent=v?v.note:'';
  renderPt();
  document.getElementById('verse').focus();
  ann(m.name+'，'+curPts.length+'穴。先念整段口訣：'+(v?v.text:''));
}
function goHome(){
  speechSynthesis&&speechSynthesis.cancel();
  document.getElementById('flow').hidden=true;
  document.getElementById('home').hidden=false;
  ann('選擇經絡');
}
function renderPt(){
  var p=curPts[idx];
  document.getElementById('prog').textContent='第 '+(idx+1)+' / '+curPts.length+' 穴';
  var tags='';
  if(p.sp&&p.sp!=='—'){tags='<div class="pt-tags"><span class="tag sp">'+p.sp.replace(/；/g,'</span><span class="tag sp">')+'</span></div>'}
  var html='<div class="pt-order">第 '+(idx+1)+' 穴</div>'+
    '<div class="pt-name-lg">'+p.n+'<span class="id">'+p.id+'</span></div>'+
    '<div class="pt-py">'+p.py+'</div>'+tags+
    '<div class="map"><span class="map-label">相對位置</span>'+p.map+'</div>'+
    '<div class="file" id="file" '+(fileOpen?'':'hidden')+'>'+
      '<div class="frow"><span class="flabel">骨標定位</span>'+p.bone+'</div>'+
      '<div class="frow"><span class="flabel">身體摸取</span>'+p.touch+'</div>'+
      '<div class="frow"><span class="flabel">寸法</span>'+p.cun+'</div>'+
      '<div class="frow"><span class="flabel">解剖</span>'+p.ana+'</div>'+
      '<div class="frow"><span class="flabel">特定穴</span>'+p.sp+'</div>'+
      '<div class="ftip"><span class="flabel">口訣</span>'+p.tip+'</div>'+
      '<div style="margin-top:.7rem"><button class="btn btn-o btn-sm" onclick="speakPt()">🔊 念這一穴</button></div>'+
    '</div>';
  document.getElementById('pt-stage').innerHTML=html;
  document.getElementById('file-btn').textContent=fileOpen?'收合小檔案':'打開小檔案';
  ann('第'+(idx+1)+'穴，'+p.n+'。'+p.map);
}
function nextPt(){if(idx<curPts.length-1){idx++;fileOpen=false;renderPt();document.getElementById('pt-stage').focus()}else{ann('已經是最後一穴')}}
function prevPt(){if(idx>0){idx--;fileOpen=false;renderPt();document.getElementById('pt-stage').focus()}else{ann('已經是第一穴')}}
function toggleFile(){
  fileOpen=!fileOpen;
  var f=document.getElementById('file');
  if(f){f.hidden=!fileOpen}
  document.getElementById('file-btn').textContent=fileOpen?'收合小檔案':'打開小檔案';
  if(fileOpen){var p=curPts[idx];ann('小檔案。骨標：'+p.bone+'。摸取：'+p.touch+'。寸法：'+p.cun+'。口訣：'+p.tip)}
  else{ann('已收合')}
}
function speakPt(){var p=curPts[idx];speak(p.n+'穴，'+p.id+'。相對位置：'+p.map+'骨標：'+p.bone+'寸法：'+p.cun+'口訣：'+p.tip)}
function speakVerse(){var v=VERSES[curMer];if(v)speak('整段口訣：'+v.text+' '+v.note)}

// ============ 鍵盤快速鍵（跳穴用）============
// 只在背誦流程開啟時生效；在輸入框打字時不攔截
document.addEventListener('keydown',function(e){
  var flow=document.getElementById('flow');
  if(!flow||flow.hidden)return;              // 不在背誦流程就不管
  var t=e.target.tagName;
  if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA')return;  // 打字時不攔截
  var k=e.key;
  // 下一穴：右鍵、下鍵、空白鍵、n、j
  if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='n'||k==='N'||k==='j'){
    e.preventDefault();nextPt();
  }
  // 上一穴：左鍵、上鍵、p、k
  else if(k==='ArrowLeft'||k==='ArrowUp'||k==='p'||k==='P'||k==='k'){
    e.preventDefault();prevPt();
  }
  // 打開/收合小檔案：f、Enter
  else if(k==='f'||k==='F'||k==='Enter'){
    e.preventDefault();toggleFile();
  }
});

// ============ 手機翻頁手勢 ============
// 單指滑（沒開語音時）＋ 雙指滑（開語音時，避開螢幕閱讀器的單指手勢）
// 四個方向都支援：往左或往上滑 = 下一穴；往右或往下滑 = 上一穴
// 跟著穴位排列直覺走，不用記特殊手勢
(function(){
  var startX=0,startY=0,startN=0,tracking=false;
  var MIN=45;  // 最小滑動距離(px)，太短不算翻頁

  function inFlow(){var f=document.getElementById('flow');return f&&!f.hidden}

  document.addEventListener('touchstart',function(e){
    if(!inFlow()){tracking=false;return}
    var t=e.target.tagName;
    if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA'||t==='BUTTON'){tracking=false;return}
    startN=e.touches.length;                 // 記錄幾根手指
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    tracking=true;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    // 雙指滑動時，若確定是水平/垂直翻頁，阻止頁面捲動
    if(tracking&&startN>=2){
      var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)>MIN||Math.abs(dy)>MIN){ if(e.cancelable)e.preventDefault(); }
    }
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!tracking||!inFlow())return;
    tracking=false;
    var endT=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0]:null;
    if(!endT)return;
    var dx=endT.clientX-startX, dy=endT.clientY-startY;
    var ax=Math.abs(dx), ay=Math.abs(dy);
    if(ax<MIN&&ay<MIN)return;                 // 滑太短，不算

    // 判斷主要方向
    if(ax>=ay){                               // 水平為主
      if(dx<0)nextPt();                       // 往左滑 → 下一穴
      else prevPt();                          // 往右滑 → 上一穴
    }else{                                     // 垂直為主
      if(dy<0)nextPt();                       // 往上滑 → 下一穴
      else prevPt();                          // 往下滑 → 上一穴
    }
  },{passive:true});
})();

renderHome();
</script>
