<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>經絡背誦教練</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--ink:#22303a;--paper:#faf7f0;--card:#fff;--gold:#a9762f;--gold-dk:#7d5420;--gold-deep:#5c3c17;
--jade:#2b5f4f;--jade-lt:#e3efe9;--warm:#f0e8d8;--line:#d6ccb5;--muted:#5d5546;--accent:#8f3a3a;
}
body{font-family:"Noto Sans TC",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.8;font-size:1.0625rem}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
a:focus,button:focus,select:focus,[tabindex]:focus{outline:3px solid var(--gold);outline-offset:3px}
.skip{position:absolute;left:-9999px;background:var(--ink);color:#fff;padding:8px 16px;z-index:99}
.skip:focus{left:0;top:0}
#app{max-width:720px;margin:0 auto;padding:1rem}
header{border-bottom:2px solid var(--gold);padding-bottom:.7rem;margin-bottom:1.2rem;display:flex;align-items:flex-start;justify-content:space-between;gap:.8rem;flex-wrap:wrap}
h1{font-size:1.4375rem;font-weight:700;color:var(--jade);letter-spacing:1px}
.sub{font-size:0.9375rem;color:var(--muted);margin-top:3px}
#font-size-btn{flex:0 0 auto}

/* 首頁經絡選單 */
.intro{background:var(--jade-lt);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.2rem;font-size:0.9375rem}
.intro b{color:var(--jade)}
.mer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.mer-btn{padding:14px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);min-height:44px}
.mer-btn:hover{background:var(--warm);border-color:var(--gold)}
.mer-btn:disabled{opacity:.45;cursor:not-allowed}
.mer-code{font-size:0.875rem;color:var(--gold-dk);font-weight:700;letter-spacing:.5px}
.mer-name{display:block;font-weight:600;font-size:1rem;margin-top:2px}
.mer-cnt{font-size:0.875rem;color:var(--muted);margin-top:2px}

/* 背誦流程 */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.btn{padding:12px 18px;font-size:0.9375rem;border:1.5px solid var(--gold-dk);border-radius:10px;background:var(--gold-dk);color:#fff;cursor:pointer;font-family:inherit;font-weight:500;min-height:44px}
.btn:hover{background:var(--gold-deep);border-color:var(--gold-deep)}
.btn-o{background:var(--card);color:var(--jade);border-color:var(--line)}
.btn-o:hover{background:var(--jade-lt);border-color:var(--jade)}
.btn-sm{padding:10px 16px;font-size:0.875rem;min-height:44px}
.flow-title{font-size:1.1875rem;font-weight:700;color:var(--jade)}
.flow-sub{font-size:0.9375rem;color:var(--muted)}

/* 整段口訣 */
.verse{background:var(--warm);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin-bottom:1.2rem}
.verse-label{font-size:0.875rem;font-weight:700;color:var(--gold-deep);letter-spacing:1px;margin-bottom:.3rem}
.verse-text{font-size:1.1875rem;font-weight:600;color:var(--ink);line-height:2;letter-spacing:1px}
.verse-note{font-size:0.875rem;color:var(--muted);margin-top:.5rem}

/* 穴位逐一 */
.prog{font-size:0.9375rem;color:var(--muted);margin-bottom:.6rem;text-align:center}
.pt-stage{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:1.5rem 1.3rem;margin-bottom:1rem}
.pt-order{font-size:0.875rem;color:var(--gold-dk);font-weight:700;letter-spacing:.5px}
.pt-name-lg{font-size:1.875rem;font-weight:700;color:var(--jade);margin:.2rem 0}
.pt-name-lg .id{font-size:1rem;color:var(--gold-dk);margin-left:8px;letter-spacing:.5px}
.pt-py{font-size:0.9375rem;color:var(--muted);font-style:italic}
.pt-tags{display:flex;gap:5px;flex-wrap:wrap;margin:.5rem 0}
.tag{font-size:0.875rem;padding:2px 9px;border-radius:20px;background:var(--jade);color:#fff;font-weight:500}
.tag.sp{background:var(--accent);border:1.5px solid var(--ink);font-weight:700}
.tag.sp::before{content:"★ ";}
/* 相對位置 — 心理地圖，永遠先顯示 */
.map{background:var(--jade-lt);border-radius:10px;padding:.8rem 1rem;margin:.7rem 0;font-size:1.0625rem}
.map-label{font-size:0.875rem;font-weight:700;color:var(--jade);display:block;margin-bottom:.2rem}
/* 小檔案 */
.file{border-top:1px dashed var(--line);margin-top:.9rem;padding-top:.9rem}
.file[hidden]{display:none}
.frow{margin-bottom:.5rem;font-size:0.9375rem}
.flabel{display:inline-block;font-size:0.875rem;font-weight:700;color:var(--gold-deep);background:var(--warm);padding:1px 9px;border-radius:5px;margin-right:6px;min-width:64px;text-align:center}
.ftip{background:var(--jade-lt);border-left:3px solid var(--jade);padding:.5rem .8rem;border-radius:0 6px 6px 0;margin-top:.5rem;font-size:0.9375rem}
.nav-row{display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;margin-top:1rem}
.nav-left{display:flex;gap:8px;flex-wrap:wrap}
.hint{font-size:0.875rem;color:var(--muted);text-align:center;margin-top:.8rem;line-height:1.6}
kbd{background:var(--warm);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:0.875rem;font-family:inherit}

/* 平板：稍寬間距與按鈕 */
@media(min-width:481px) and (max-width:820px){
  #app{padding:1.1rem}
  .btn{padding:13px 20px}
  .nav-row{gap:12px}
}
/* 手機：字級不縮小，加大間距與觸控區，避免誤觸 */
@media(max-width:480px){
  #app{padding:.85rem}
  .top-bar{gap:14px}
  .nav-row{gap:14px}
  .nav-left{gap:14px}
  .btn,.btn-sm{padding:13px 18px;min-height:48px}
  .mer-grid{gap:14px}
}
</style>
</head>
<body>
<a href="#main" class="skip">跳到主要內容</a>
<span class="sr-only" aria-live="assertive" id="ann"></span>
<div id="app">
<header>
<div>
<h1>經絡背誦教練</h1>
<p class="sub">一條經一條經，順著念、順著記 ‧ 相對位置建立心理地圖 ‧ 需要時打開小檔案</p>
</div>
<button class="btn btn-o btn-sm" id="font-size-btn" onclick="cycleFontSize()" aria-label="調整字級，目前標準大小，點按切換為大字級"></button>
</header>

<main id="main">
<!-- 首頁：選經絡 -->
<section id="home" aria-label="選擇經絡">
<div class="intro">
選一條經絡開始。工具會先帶你念<b>整段口訣</b>，再一穴一穴往下走。每停一穴，先聽<b>穴名和相對位置</b>幫你在腦中定位；忘記怎麼取穴時，打開<b>小檔案</b>複習寸法、骨標和解剖。
</div>
<div class="mer-grid" id="mer-grid"></div>
</section>

<!-- 背誦流程 -->
<section id="flow" aria-label="背誦流程" hidden>
<div class="top-bar">
<button class="btn btn-o btn-sm" onclick="goHome()">← 換一條經</button>
<div>
<div class="flow-title" id="flow-title"></div>
<div class="flow-sub" id="flow-sub"></div>
</div>
</div>

<!-- 整段口訣 -->
<div class="verse" id="verse" tabindex="0">
<div class="verse-label">整段口訣</div>
<div class="verse-text" id="verse-text"></div>
<div class="verse-note" id="verse-note"></div>
<button class="btn btn-o btn-sm" style="margin-top:.6rem" onclick="speakVerse()">🔊 念口訣</button>
</div>

<!-- 逐穴 -->
<p class="prog" id="prog" aria-live="polite"></p>
<div class="pt-stage" id="pt-stage" tabindex="0"></div>

<div class="nav-row">
<div class="nav-left">
<button class="btn btn-o btn-sm" onclick="prevPt()">← 上一穴</button>
<button class="btn btn-sm" id="file-btn" onclick="toggleFile()" aria-expanded="false">打開小檔案</button>
</div>
<button class="btn btn-sm" onclick="nextPt()">下一穴 →</button>
</div>
<p class="hint">
電腦：按 <kbd>空白鍵</kbd> 或 <kbd>→</kbd> 到下一穴，<kbd>←</kbd> 回上一穴，<kbd>F</kbd> 開／收小檔案。<br>
手機：往左或往上滑到下一穴，往右或往下滑回上一穴（開語音時用雙指滑）。<br>
忘記取穴就打開小檔案複習。
</p>
</section>
</main>
</div>

   touch:'摸胸骨中段略突起處（胸骨角）稍下方，正中線上，即為此穴。',

   tip:'「紫宮」為星宿名，喻心之尊位，主治胸痛、咳喘。'},

   touch:'摸胸骨角（胸骨中段的橫向隆起），其上方即為此穴。',

   ana:'淺筋膜較薄，幾乎無脂肪；布第一肋間神經前皮支內側支；有胸廓內動、靜脈前穿支。',

  {id:'CV23',n:'廉泉',py:'liánquán',
   map:'頸部正中線，喉結上方，下巴與喉結連線中點。',
   bone:'頸前正中線喉結正上方，舌骨上緣凹陷處，當下頦正中與喉結連線的中點。',
   touch:'下巴尖端與喉結連線的中點，正中線上凹陷處，即為此穴。',
   cun:'前正中線，舌骨上緣凹陷處。',
   ana:'下頜舌骨肌、頦舌骨肌、舌體；布舌神經、舌下神經分支；有舌動、靜脈。',
   sp:'交會穴：陰維脈、任脈之會。',
   tip:'「廉泉」如清泉出於舌下，主利喉舌，治舌強、失音，針向舌根斜刺。'},
  {id:'CV24',n:'承漿',py:'chéngjiāng',
   map:'臉部下唇下方，頦唇溝正中凹陷處。',
   bone:'面部下唇中，頦唇溝正中凹陷處。',
   touch:'下唇正下方、下巴上緣的凹陷處，即為此穴，任脈最後一穴。',
   cun:'前正中線，頦唇溝正中凹陷。',
   ana:'口輪匝肌和頦肌之間；布面神經及頦神經分支；有下唇動、靜脈分支。',
   sp:'交會穴：足陽明胃經、任脈之會。',
   tip:'「承漿」意為承接口中津液（漿）之處，是任脈終點，與督脈之首齦交遙相呼應。'}
 ],
};

</script>
<script>
// ============ 語音 ============
var canSpeak='speechSynthesis' in window;
function speak(t){if(!canSpeak)return;speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='zh-TW';u.rate=0.9;speechSynthesis.speak(u)}
function ann(m){var e=document.getElementById('ann');e.textContent='';setTimeout(function(){e.textContent=m},60)}

// ============ 字級調整（標準／大／特大，循環切換，記住選擇）============
var FONT_SIZES=[
  {pct:'100%',label:'標準',next:'大'},
  {pct:'125%',label:'大',next:'特大'},
  {pct:'150%',label:'特大',next:'標準'}
];
var fontSizeIdx=0;
function applyFontSize(i){
  document.documentElement.style.fontSize=FONT_SIZES[i].pct;
  var btn=document.getElementById('font-size-btn');
  if(btn){
    btn.textContent='字級：'+FONT_SIZES[i].label;
    btn.setAttribute('aria-label','調整字級，目前'+FONT_SIZES[i].label+'，點按切換為'+FONT_SIZES[i].next+'字級');
  }
}
function cycleFontSize(){
  fontSizeIdx=(fontSizeIdx+1)%FONT_SIZES.length;
  try{localStorage.setItem('acupoint-font-size',fontSizeIdx)}catch(e){}
  applyFontSize(fontSizeIdx);
  ann('字級已切換為'+FONT_SIZES[fontSizeIdx].label);
}
(function(){
  var saved=0;
  try{var v=parseInt(localStorage.getItem('acupoint-font-size'),10);if(!isNaN(v)&&v>=0&&v<FONT_SIZES.length)saved=v}catch(e){}
  fontSizeIdx=saved;
  applyFontSize(fontSizeIdx);
})();

// ============ 資料 ============
// map=相對位置(心理地圖) | bone=骨標定位 | touch=身體摸取 | cun=寸法 | ana=解剖 | sp=特定穴屬性 | tip=口訣
var MERIDIANS=[
 {code:'LU',name:'手太陰肺經',short:'肺',cnt:11,ready:true},
 {code:'LI',name:'手陽明大腸經',short:'大腸',cnt:20,ready:true},
 {code:'ST',name:'足陽明胃經',short:'胃',cnt:45,ready:true},
 {code:'SP',name:'足太陰脾經',short:'脾',cnt:21,ready:true},
 {code:'HT',name:'手少陰心經',short:'心',cnt:9,ready:true},
 {code:'SI',name:'手太陽小腸經',short:'小腸',cnt:19,ready:true},
 {code:'BL',name:'足太陽膀胱經',short:'膀胱',cnt:67,ready:true},
 {code:'KI',name:'足少陰腎經',short:'腎',cnt:27,ready:true},
 {code:'PC',name:'手厥陰心包經',short:'心包',cnt:9,ready:true},
 {code:'TE',name:'手少陽三焦經',short:'三焦',cnt:23,ready:true},
 {code:'GB',name:'足少陽膽經',short:'膽',cnt:44,ready:true},
 {code:'LR',name:'足厥陰肝經',short:'肝',cnt:14,ready:true},
 {code:'GV',name:'督脈',short:'督',cnt:28,ready:true},
 {code:'CV',name:'任脈',short:'任',cnt:24,ready:true}
];

// VERSES 與 POINTS 資料內嵌於上方資料區

// ============ 首頁 ============
function renderHome(){
  var g=document.getElementById('mer-grid'),html='';
  MERIDIANS.forEach(function(m){
    var status=m.ready?(m.cnt+'穴 · 可背誦'):(m.cnt+'穴 · 建置中');
    html+='<button class="mer-btn" '+(m.ready?'':'disabled')+' onclick="startFlow(\''+m.code+'\')" aria-label="'+m.name+'，'+status+'">'+
      '<span class="mer-code">'+m.code+'</span>'+
      '<span class="mer-name">'+m.name+'</span>'+
      '<span class="mer-cnt">'+status+'</span></button>';
  });
  g.innerHTML=html;
}

// ============ 背誦流程 ============
var curMer='',curPts=[],idx=0,fileOpen=false;
function startFlow(code){
  curMer=code;curPts=POINTS[code]||[];idx=0;fileOpen=false;
  var m=MERIDIANS.filter(function(x){return x.code===code})[0];
  document.getElementById('home').hidden=true;
  document.getElementById('flow').hidden=false;
  document.getElementById('flow-title').textContent=m.name+'（'+m.code+'）';
  document.getElementById('flow-sub').textContent='共 '+curPts.length+' 穴，順著念、順著記';
  var v=VERSES[code];
  document.getElementById('verse-text').textContent=v?v.text:'（口訣建置中）';
  document.getElementById('verse-note').textContent=v?v.note:'';
  renderPt();
  document.getElementById('verse').focus();
  ann(m.name+'，'+curPts.length+'穴。先念整段口訣：'+(v?v.text:''));
}
function goHome(){
  speechSynthesis&&speechSynthesis.cancel();
  document.getElementById('flow').hidden=true;
  document.getElementById('home').hidden=false;
  ann('選擇經絡');
}
function renderPt(){
  var p=curPts[idx];
  document.getElementById('prog').textContent='第 '+(idx+1)+' / '+curPts.length+' 穴';
  var tags='';
  if(p.sp&&p.sp!=='—'){tags='<div class="pt-tags"><span class="tag sp">'+p.sp.replace(/；/g,'</span><span class="tag sp">')+'</span></div>'}
  var html='<div class="pt-order">第 '+(idx+1)+' 穴</div>'+
    '<div class="pt-name-lg">'+p.n+'<span class="id">'+p.id+'</span></div>'+
    '<div class="pt-py">'+p.py+'</div>'+tags+
    '<div class="map"><span class="map-label">相對位置</span>'+p.map+'</div>'+
    '<div class="file" id="file" '+(fileOpen?'':'hidden')+'>'+
      '<div class="frow"><span class="flabel">骨標定位</span>'+p.bone+'</div>'+
      '<div class="frow"><span class="flabel">身體摸取</span>'+p.touch+'</div>'+
      '<div class="frow"><span class="flabel">寸法</span>'+p.cun+'</div>'+
      '<div class="frow"><span class="flabel">解剖</span>'+p.ana+'</div>'+
      '<div class="frow"><span class="flabel">特定穴</span>'+p.sp+'</div>'+
      '<div class="ftip"><span class="flabel">口訣</span>'+p.tip+'</div>'+
      '<div style="margin-top:.7rem"><button class="btn btn-o btn-sm" onclick="speakPt()">🔊 念這一穴</button></div>'+
    '</div>';
  document.getElementById('pt-stage').innerHTML=html;
  var fb=document.getElementById('file-btn');
  fb.textContent=fileOpen?'收合小檔案':'打開小檔案';
  fb.setAttribute('aria-expanded',fileOpen?'true':'false');
  ann('第'+(idx+1)+'穴，'+p.n+'。'+p.map);
}
function nextPt(){if(idx<curPts.length-1){idx++;fileOpen=false;renderPt();document.getElementById('pt-stage').focus()}else{ann('已經是最後一穴')}}
function prevPt(){if(idx>0){idx--;fileOpen=false;renderPt();document.getElementById('pt-stage').focus()}else{ann('已經是第一穴')}}
function toggleFile(){
  fileOpen=!fileOpen;
  var f=document.getElementById('file');
  if(f){f.hidden=!fileOpen}
  var fb=document.getElementById('file-btn');
  fb.textContent=fileOpen?'收合小檔案':'打開小檔案';
  fb.setAttribute('aria-expanded',fileOpen?'true':'false');
  if(fileOpen){var p=curPts[idx];ann('小檔案。骨標：'+p.bone+'。摸取：'+p.touch+'。寸法：'+p.cun+'。口訣：'+p.tip)}
  else{ann('已收合')}
}
function speakPt(){var p=curPts[idx];speak(p.n+'穴，'+p.id+'。相對位置：'+p.map+'骨標：'+p.bone+'寸法：'+p.cun+'口訣：'+p.tip)}
function speakVerse(){var v=VERSES[curMer];if(v)speak('整段口訣：'+v.text+' '+v.note)}

// ============ 鍵盤快速鍵（跳穴用）============
// 只在背誦流程開啟時生效；在輸入框打字時不攔截
document.addEventListener('keydown',function(e){
  var flow=document.getElementById('flow');
  if(!flow||flow.hidden)return;              // 不在背誦流程就不管
  var t=e.target.tagName;
  if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA')return;  // 打字時不攔截
  var k=e.key;
  // 下一穴：右鍵、下鍵、空白鍵、n、j
  if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='n'||k==='N'||k==='j'){
    e.preventDefault();nextPt();
  }
  // 上一穴：左鍵、上鍵、p、k
  else if(k==='ArrowLeft'||k==='ArrowUp'||k==='p'||k==='P'||k==='k'){
    e.preventDefault();prevPt();
  }
  // 打開/收合小檔案：f、Enter
  else if(k==='f'||k==='F'||k==='Enter'){
    e.preventDefault();toggleFile();
  }
});

// ============ 手機翻頁手勢 ============
// 單指滑（沒開語音時）＋ 雙指滑（開語音時，避開螢幕閱讀器的單指手勢）
// 四個方向都支援：往左或往上滑 = 下一穴；往右或往下滑 = 上一穴
// 跟著穴位排列直覺走，不用記特殊手勢
(function(){
  var startX=0,startY=0,startN=0,tracking=false;
  var MIN=45;  // 最小滑動距離(px)，太短不算翻頁

  function inFlow(){var f=document.getElementById('flow');return f&&!f.hidden}

  document.addEventListener('touchstart',function(e){
    if(!inFlow()){tracking=false;return}
    var t=e.target.tagName;
    if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA'||t==='BUTTON'){tracking=false;return}
    startN=e.touches.length;                 // 記錄幾根手指
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    tracking=true;
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    // 雙指滑動時，若確定是水平/垂直翻頁，阻止頁面捲動
    if(tracking&&startN>=2){
      var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)>MIN||Math.abs(dy)>MIN){ if(e.cancelable)e.preventDefault(); }
    }
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!tracking||!inFlow())return;
    tracking=false;
    var endT=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0]:null;
    if(!endT)return;
    var dx=endT.clientX-startX, dy=endT.clientY-startY;
    var ax=Math.abs(dx), ay=Math.abs(dy);
    if(ax<MIN&&ay<MIN)return;                 // 滑太短，不算

    // 判斷主要方向
    if(ax>=ay){                               // 水平為主
      if(dx<0)nextPt();                       // 往左滑 → 下一穴
      else prevPt();                          // 往右滑 → 上一穴
    }else{                                     // 垂直為主
      if(dy<0)nextPt();                       // 往上滑 → 下一穴
      else prevPt();                          // 往下滑 → 上一穴
    }
  },{passive:true});
})();

renderHome();
</script>
